<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Portal | JanArogyaAI</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBeYFfT8-6Gp8Ny9nYlmPpxo8wlaPPqaEc",
            authDomain: "janarogyaai-b986f.firebaseapp.com",
            projectId: "janarogyaai-b986f",
            storageBucket: "janarogyaai-b986f.firebasestorage.app",
            messagingSenderId: "547534016067",
            appId: "1:547534016067:web:8ee578af16b6f460ec8ef6",
            measurementId: "G-K9PL78L0TJ"
        };
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isOtpSent = false;
        let isHospitalVerified = false;

        window.registerHospital = async function(e){
            e.preventDefault();
            const btn = document.getElementById("regBtn");
            const ogText = btn.innerHTML;
            
            try {
                const name = document.getElementById("hospitalName").value;
                const hospitalType = document.getElementById("hospitalType").value;
                const address = document.getElementById("hospitalAddress").value;
                const email = document.getElementById("hospitalEmail").value;
                const password = document.getElementById("hospitalPassword").value;

                if (!hospitalType) {
                    throw new Error("Please select a hospital type/specialty.");
                }

                // If OTP hasn't been sent yet, send it first
                if (!isOtpSent) {
                    btn.innerHTML = "Sending Verification Code...";
                    btn.disabled = true;
                    
                    const otpRes = await fetch('/api/send-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const otpData = await otpRes.json();
                    
                    if (otpData.success) {
                        isOtpSent = true;
                        // Show OTP input
                        document.getElementById('otpGroup').style.display = 'block';
                        btn.innerHTML = "Verify Code & Finalize Registration";
                        alert("An OTP has been sent to your email. Please check your inbox (and spam folder) and enter it below to register.");
                    } else {
                        throw new Error(otpData.error || "Failed to send OTP.");
                    }
                    
                    btn.disabled = false;
                    return; // Stop here and wait for the user to type OTP and submit again
                }

                // If OTP has been sent, verify it
                const otpInput = document.getElementById("hospitalOtp").value;
                if (!otpInput) {
                    throw new Error("Please enter the OTP sent to your email.");
                }

                btn.innerHTML = "Verifying & Registering...";
                btn.disabled = true;

                // Call Verify API
                const verifyRes = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, otp: otpInput })
                });
                const verifyData = await verifyRes.json();

                if (!verifyData.success) {
                    throw new Error(verifyData.error || "Invalid OTP entered.");
                }

                // OTP is correct! Proceed to Firebase Registration
                const user = await createUserWithEmailAndPassword(auth,email,password);
                
                await setDoc(doc(db,"hospitals",user.user.uid),{
                    name, type: hospitalType, address, email, uid:user.user.uid
                });
                
                alert("Email Verified & Hospital Registered Successfully. You can now login.");
                
                // Reset form state
                isOtpSent = false;
                document.getElementById('otpGroup').style.display = 'none';
                e.target.reset();
                showSection('login');
                
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                if(!isOtpSent || isHospitalVerified) {
                    btn.innerHTML = "Register Hospital";
                } else if(isOtpSent) {
                    btn.innerHTML = "Verify Code & Finalize Registration";
                }
                btn.disabled = false;
            }
        }

        window.loginHospital = async function(e){
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const ogText = btn.innerHTML;
            btn.innerHTML = "Logging in...";
            try {
                const email = document.getElementById("loginEmail").value;
                const password = document.getElementById("loginPassword").value;
                await signInWithEmailAndPassword(auth,email,password);
                window.location.href="/hospital";
            } catch (err) {
                alert("Error: " + err.message);
            }
            btn.innerHTML = ogText;
        }

        window.showSection = function(section) {
            if (section === 'login') {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('registerSection').style.display = 'none';
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
            } else {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('registerSection').style.display = 'block';
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
            }
        }

        window.onload = () => {
            if(window.location.hash === '#register') {
                showSection('register');
            } else {
                showSection('login');
            }
        }
    </script>

    <style>
        .auth-container {
            max-width: 500px;
            margin: 120px auto 60px;
            position: relative;
            z-index: 10;
        }
        .form-section { display: none; }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active {
            color: var(--primary-400);
            border-bottom-color: var(--primary-400);
        }
        .full-width { width: 100%; justify-content: center; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orbs">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <nav class="navbar" id="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-logo">🧬</div>
            <span class="nav-title">JanArogyaAI</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/patient" class="nav-link">Patient Portal</a>
            <a href="/doctor_auth" class="nav-link">Doctor Portal</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="feature-card" style="padding: 0; overflow: hidden;">
            <div class="tabs">
                <button class="tab-btn active" id="tabLogin" onclick="showSection('login')">Hospital Login</button>
                <button class="tab-btn" id="tabRegister" onclick="showSection('register')">Register</button>
            </div>
            
            <div style="padding: 30px;">
                <div id="loginSection" class="form-section" style="display: block;">
                    <h2 class="section-title" style="font-size: 24px; text-align: center; margin-bottom: 24px;">Welcome Back 🏥</h2>
                    <form onsubmit="loginHospital(event)">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="loginEmail" class="form-input" placeholder="Enter hospital email" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-primary full-width" style="background: var(--gradient-primary); border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; color: white; cursor: pointer;">Sign In</button>
                    </form>
                </div>

                <div id="registerSection" class="form-section">
                    <h2 class="section-title" style="font-size: 24px; text-align: center; margin-bottom: 24px;">Register Hospital</h2>
                    <form onsubmit="registerHospital(event)">
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label class="form-label">Hospital Name</label>
                            <input type="text" id="hospitalName" class="form-input" placeholder="e.g. City General Hospital" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label class="form-label">Hospital Type / Specialization</label>
                            <select id="hospitalType" class="form-input" required style="background: var(--bg-card); color: var(--text-primary); cursor: pointer;">
                                <option value="" disabled selected>Select facility type...</option>
                                <option value="Multi-Specialty">Multi-Specialty</option>
                                <option value="General Clinic">General Clinic</option>
                                <option value="Skin Care / Dermatology">Skin Care / Dermatology</option>
                                <option value="ENT Center">ENT Center</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Dental Clinic">Dental Clinic</option>
                                <option value="Eye Care / Ophthalmology">Eye Care / Ophthalmology</option>
                                <option value="Other Specific Specialty">Other Specific Specialty</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label class="form-label">Hospital Address</label>
                            <input type="text" id="hospitalAddress" class="form-input" placeholder="Full medical facility address" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label class="form-label">Contact Email</label>
                            <input type="email" id="hospitalEmail" class="form-input" placeholder="Official hospital email" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label class="form-label">Password</label>
                            <input type="password" id="hospitalPassword" class="form-input" placeholder="Create a strong password" required>
                        </div>
                        <div class="form-group" id="otpGroup" style="margin-bottom: 24px; display: none;">
                            <label class="form-label" style="color: var(--primary-400);">Verification Code (OTP)</label>
                            <input type="text" id="hospitalOtp" class="form-input" placeholder="Enter the 6-digit code sent to your email" style="border-color: var(--primary-400);">
                        </div>
                        <button type="submit" id="regBtn" class="btn btn-primary full-width" style="background: var(--gradient-primary); border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; color: white; cursor: pointer;">Register Hospital</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
